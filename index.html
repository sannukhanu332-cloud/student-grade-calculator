<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eaf4ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:700px;
max-width:100%;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:25px;
color:#0d47a1;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.input-box{
display:flex;
flex-direction:column;
}

label{
margin-bottom:8px;
font-weight:bold;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#1976d2;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
margin-bottom:20px;
}

table th{
background:#1976d2;
color:white;
padding:12px;
}

table td{
border:1px solid #ddd;
padding:12px;
}

table input{
width:100%;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.calculate{
background:#1976d2;
color:white;
}

.calculate:hover{
background:#0d47a1;
}

.reset{
background:#666;
color:white;
}

.reset:hover{
background:#444;
}

.result{
display:none;
background:#f7f7f7;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
}

.result h2{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

.result p{
margin:10px 0;
font-size:18px;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.buttons{
flex-direction:column;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Student Grade Calculator</h1>

<div class="row">

<div class="input-box">
<label>Student Name</label>
<input type="text" id="studentName" placeholder="Enter student name">
</div>

<div class="input-box">
<label>Roll Number</label>
<input type="text" id="rollNumber" placeholder="Enter roll number">
</div>

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks (0-100)</th>
</tr>

<tr>
<td>English</td>
<td><input type="number" id="english"></td>
</tr>

<tr>
<td>Mathematics</td>
<td><input type="number" id="math"></td>
</tr>

<tr>
<td>Science</td>
<td><input type="number" id="science"></td>
</tr>

<tr>
<td>Computer</td>
<td><input type="number" id="computer"></td>
</tr>

<tr>
<td>Urdu</td>
<td><input type="number" id="urdu"></td>
</tr>

</table>

<div class="buttons">

<button class="calculate" onclick="calculateResult()">
Calculate Result
</button>

<button class="reset" onclick="resetForm()">
Reset
</button>

</div>

<div class="result" id="result">

<h2>Result Card</h2>

<p><strong>Name:</strong> <span id="showName"></span></p>

<p><strong>Roll Number:</strong> <span id="showRoll"></span></p>

<p><strong>Total Marks:</strong> 500</p>

<p><strong>Obtained Marks:</strong> <span id="obtained"></span></p>

<p><strong>Percentage:</strong> <span id="percentage"></span></p>

<p><strong>Grade:</strong> <span id="grade"></span></p>

<p><strong>Status:</strong> <span id="status"></span></p>

<p><strong>Remarks:</strong> <span id="remarks"></span></p>

</div>

<script>function calculateResult() {

    let studentName = document.getElementById("studentName").value.trim();
    let rollNumber = document.getElementById("rollNumber").value.trim();

    let english = Number(document.getElementById("english").value);
    let math = Number(document.getElementById("math").value);
    let science = Number(document.getElementById("science").value);
    let computer = Number(document.getElementById("computer").value);
    let urdu = Number(document.getElementById("urdu").value);

    if (studentName === "" || rollNumber === "") {

        alert("Please enter student name and roll number.");
        return;

    }

    let marks = [english, math, science, computer, urdu];

    for (let i = 0; i < marks.length; i++) {

        if (isNaN(marks[i])) {

            alert("Please enter all subject marks.");
            return;

        }

        if (marks[i] < 0 || marks[i] > 100) {

            alert("Marks should be between 0 and 100.");
            return;

        }

    }

    let totalMarks = 500;

    let obtainedMarks =
        english +
        math +
        science +
        computer +
        urdu;

    let percentage =
        (obtainedMarks / totalMarks) * 100;

    let grade = "";

    let remarks = "";

    let status = "";

    if (percentage >= 90) {

        grade = "A+";
        remarks = "Excellent Performance";
        status = "PASS";

    }

    else if (percentage >= 80) {

        grade = "A";
        remarks = "Very Good";
        status = "PASS";

    }

    else if (percentage >= 70) {

        grade = "B";
        remarks = "Good";
        status = "PASS";

    }

    else if (percentage >= 60) {

        grade = "C";
        remarks = "Satisfactory";
        status = "PASS";

    }

    else if (percentage >= 50) {

        grade = "D";
        remarks = "Needs Improvement";
        status = "PASS";

    }

    else {

        grade = "F";
        remarks = "Better Luck Next Time";
        status = "FAIL";

    }

    document.getElementById("result").style.display = "block";

    document.getElementById("showName").innerHTML = studentName;

    document.getElementById("showRoll").innerHTML = rollNumber;

    document.getElementById("obtained").innerHTML = obtainedMarks;

    document.getElementById("percentage").innerHTML =
        percentage.toFixed(2) + "%";

    document.getElementById("grade").innerHTML = grade;    document.getElementById("status").innerHTML = status;
    document.getElementById("remarks").innerHTML = remarks;

    if (status === "PASS") {
        document.getElementById("status").className = "pass";
    } else {
        document.getElementById("status").className = "fail";
    }

}

// Reset Form Function
function resetForm() {

    document.getElementById("studentName").value = "";
    document.getElementById("rollNumber").value = "";

    document.getElementById("english").value = "";
    document.getElementById("math").value = "";
    document.getElementById("science").value = "";
    document.getElementById("computer").value = "";
    document.getElementById("urdu").value = "";

    document.getElementById("result").style.display = "none";

}

</script>

</body>
</html>
